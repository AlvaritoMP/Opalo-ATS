<!DOCTYPE html>
<html lang="es" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>Opalo ATS</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="description" content="Opalo ATS — reclutamiento y selección de personal" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/react-big-calendar@1.13.0/lib/css/react-big-calendar.css">
  </head>
  <body class="bg-gray-50 text-gray-800">
    <div id="root"></div>
    <!-- Libera cuota de localStorage antes de cargar React (evita QuotaExceededError en procesos masivos) -->
    <script>
      (function () {
        try {
          var keys = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('bulkColumnValues_') === 0) keys.push(k);
          }
          for (var j = 0; j < keys.length; j++) localStorage.removeItem(keys[j]);
        } catch (e) { /* ignore */ }
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
